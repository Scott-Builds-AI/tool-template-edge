name: Deploy

# Auto-deploys to Cloudflare Workers on every push to `main`.
#
# Setup checklist before this can succeed (one-time per tool repo):
#
#   1. Create the R2 ISR cache bucket referenced in wrangler.jsonc:
#        npx wrangler r2 bucket create your-tool-slug-cache
#
#   2. Push runtime secrets the tool needs (HUB_URL, etc.):
#        npx wrangler secret put HUB_URL
#
#   3. Make sure CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID are available
#      to this repo. Easiest: set them once at the org level with all-
#      repositories visibility (see Scott-Builds-AI/.github README).
#
#   4. (Phase 23) The hub's scaffolder auto-provisions the per-tool D1
#      database and writes the binding into wrangler.jsonc on accept.
#      Set the repo Variable `CLOUDFLARE_D1_NAME` to the database name
#      (`tool-<slug>-db`) so the migration step below can target it.
#      Leave the var empty if the tool doesn't use D1.
#
#   5. Add your tool's custom domain to Cloudflare and uncomment the
#      `routes` block in wrangler.jsonc.
#
# After those, every push to main applies pending D1 migrations + runs
# OpenNext build + wrangler deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate-d1:
    # Apply every SQL file under `migrations/` to the tool's D1 (Phase 23).
    # Skipped when CLOUDFLARE_D1_NAME is empty — tool opted out of D1.
    name: Apply D1 migrations
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_D1_NAME != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Apply each migrations/*.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_NAME: ${{ vars.CLOUDFLARE_D1_NAME }}
        run: |
          set -e
          shopt -s nullglob
          for f in migrations/*.sql; do
            echo "::group::Applying $f"
            pnpm dlx wrangler d1 execute "$CLOUDFLARE_D1_NAME" --file="$f" --remote --yes || {
              echo "::warning::Migration $f reported an error (may already be applied); continuing.";
            }
            echo "::endgroup::"
          done

  deploy:
    needs: [migrate-d1]
    # Always run even when migrate-d1 was skipped (no D1 var) — `success()`
    # treats skipped jobs as not-failed.
    if: ${{ always() && !cancelled() && (needs.migrate-d1.result == 'success' || needs.migrate-d1.result == 'skipped') }}
    uses: Scott-Builds-AI/.github/.github/workflows/tool-deploy.yml@main
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
