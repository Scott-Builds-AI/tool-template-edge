name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    # Lint + typecheck + test + okai-scan — see
    # Scott-Builds-AI/.github/.github/workflows/tool-ci.yml for what runs.
    uses: Scott-Builds-AI/.github/.github/workflows/tool-ci.yml@main
    with:
      run-test: false  # template ships no tests; tool authors flip to true
